version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autoapply
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
      POSTGRES_DB: autoapply
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoapply"]
      interval: 10s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redissecret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ─── ChromaDB (vector store) ────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  # ─── HashiCorp Vault (dev mode) ─────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.15
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-myroot}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    command: server -dev

  # ─── Ollama (local LLM server) ───────────────────────────────────────────
  # On Windows, Ollama runs on the HOST. Docker containers reach it via
  # host.docker.internal:11434 — no extra image needed.
  # If you prefer Ollama inside Docker, uncomment the block below:
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

  # ─── FastAPI Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      chromadb:
        condition: service_started
      vault:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://autoapply:${POSTGRES_PASSWORD:-supersecret}@postgres:5432/autoapply
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379/0
      CHROMA_HOST: http://chromadb:8000
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-myroot}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
      BRIGHTDATA_USERNAME: ${BRIGHTDATA_USERNAME}
      BRIGHTDATA_PASSWORD: ${BRIGHTDATA_PASSWORD}
      # Ollama on Windows host is reachable via host.docker.internal
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - browser_profiles:/app/browser_profiles
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

  # ─── Celery Worker ──────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - redis
      - postgres
    environment:
      DATABASE_URL: postgresql+asyncpg://autoapply:${POSTGRES_PASSWORD:-supersecret}@postgres:5432/autoapply
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379/0
      CHROMA_HOST: http://chromadb:8000
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-myroot}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q agent,email
    volumes:
      - ./backend:/app
      - browser_profiles:/app/browser_profiles

  # ─── Celery Beat (scheduler) ────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379/0
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app

  # ─── Flower (Celery monitoring) ─────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379/0
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  browser_profiles:
  ollama_data:
